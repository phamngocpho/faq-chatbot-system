version: '3.8'

services:
  # Backend API
  backend:
    build: ./backend
    container_name: faq-backend
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=mysql
      - DB_USER=faquser
      - DB_PASSWORD=faq123456
      - DB_NAME=faq_chatbot
    depends_on:
      - mysql
    networks:
      - faq-network

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: faq-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_DATABASE=faq_chatbot
      - MYSQL_USER=faquser
      - MYSQL_PASSWORD=faq123456
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql
    networks:
      - faq-network

  # AI Service
  ai-service:
    build: ./ai-service
    container_name: faq-ai-service
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=prod
      - APP_SECRET=change-this-secret-key
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=gemini-2.5-flash
      - BACKEND_API_URL=http://backend:3000/api
    depends_on:
      - backend
    networks:
      - faq-network

  # n8n
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_PORT=5678
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - faq-network

  # Livechat
  livechat:
    image: python:3.9-alpine
    container_name: faq-livechat
    working_dir: /app
    command: python -m http.server 8080
    ports:
      - "8080:8080"
    volumes:
      - ./livechat:/app
    networks:
      - faq-network

  # Admin Frontend
  admin-frontend:
    image: node:18-alpine
    container_name: faq-admin-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./admin-frontend:/app
    networks:
      - faq-network

volumes:
  mysql_data:
  n8n_data:

networks:
  faq-network:
    driver: bridge
