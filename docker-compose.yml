version: '3.8'

services:
  # Backend API
  backend:
    build: ./backend
    container_name: faq-backend
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=mysql
      - DB_USER=faquser
      - DB_PASSWORD=faq123456
      - DB_NAME=faq_chatbot
    depends_on:
      - mysql
    networks:
      - faq-network

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: faq-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_DATABASE=faq_chatbot
      - MYSQL_USER=faquser
      - MYSQL_PASSWORD=faq123456
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql
    networks:
      - faq-network

  # AI Service
  ai-service:
    build: ./ai-service
    container_name: faq-ai-service
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - BACKEND_API_URL=http://backend:3000/api
    depends_on:
      - backend
    networks:
      - faq-network

  # n8n
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_PORT=5678
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - faq-network

volumes:
  mysql_data:
  n8n_data:

networks:
  faq-network:
    driver: bridge
